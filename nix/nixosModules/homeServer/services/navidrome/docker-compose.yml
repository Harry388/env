services:
  navidrome:
    image: deluan/navidrome:0.61.2
    user: 1001:1000 # should be owner of volumes
    ports:
      - "${NAVIDROME_LISTEN:-4533}:4533"
    restart: unless-stopped
    # environment:
      # Optional: put your config options customization here. Examples:
      # ND_LOGLEVEL: debug
    volumes:
      - "./data:/data"
      - "./music:/music:ro"
