# : Manager [[[

[mgr]
cwd = { fg = "#efdfe2" }

# Tab
tab_active = { fg = "#541d34", bg = "#ffb0ca", bold = true }
tab_inactive = { fg = "#6f334a", bg = "#ffd9e3" }
tab_width = 1

# Find
find_keyword = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied = { fg = "#623f21", bg = "#623f21" }
marker_cut = { fg = "#623f21", bg = "#623f21" }
marker_marked = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#f0bc95", bg = "#f0bc95" }

# Count
count_copied = { fg = "#ffdcc3", bg = "#623f21" }
count_cut = { fg = "#ffdcc3", bg = "#623f21" }
count_selected = { fg = "#541d34", bg = "#f0bc95" }

# Border
border_style  = { fg = "#ffb0ca" }

# : ]]]


# : Status [[[

[status]
separator_style = { bg = "#541d34", fg = "#F4A261" }

[mode]
# Mode
normal_main = { bg = "#ffb0ca", fg = "#541d34", bold = true }
normal_alt  = { bg = "#514347", fg = "#d5c2c6" }

# Select mode
select_main = { bg = "#e2bdc7", fg = "#422932", bold = true }
select_alt  = { bg = "#514347", fg = "#d5c2c6" }

# Unset mode
unset_main = { bg = "#f0bc95", fg = "#48290c", bold = true }
unset_alt  = { bg = "#514347", fg = "#d5c2c6" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#ffb0ca", bg = "#191114" }
progress_error = { fg = "#ffb4ab", bg = "#191114" }

# Permissions
permissions_t = { fg = "#e2bdc7" }
permissions_w = { fg = "#f0bc95" }
permissions_x = { fg = "#ffb4ab" }
permissions_r = { fg = "#623f21" }
permissions_s = { fg = "#6f334a" }

# : ]]]


# : Select [[[

[select]
border = { fg = "#ffb0ca" }
active = { fg = "#f0bc95", bold = true }

# : ]]]


# : Input [[[

[input]
border = { fg = "#ffb0ca" }
value = { fg = "#efdfe2" }

# : ]]]

# : Tabs [[[

[tabs]
active = { fg = "#ffb0ca", bold = true, bg = "#191114" }
inactive = { fg = "#e2bdc7", bg = "#191114" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Completion [[[

[completion]
border = { fg = "#ffb0ca", bg = "#541d34" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#ffb0ca" }
title = {}
hovered = { fg = "#623f21", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#191114" }
cand = { fg = "#ffb0ca" }
rest = { fg = "#541d34" }
desc = { fg = "#efdfe2" }
separator = " ▶ "
separator_style = { fg = "#efdfe2" }

# : ]]]


# : Help [[[

[help]
on = { fg = "#efdfe2" }
run = { fg = "#efdfe2" }
footer = { fg = "#422932", bg = "#e2bdc7" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#f0bc95" }
title_warn = { fg = "#ffb0ca" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { name = "*", is = "orphan", bg = "#93000a" },
    { name = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { name = "*", fg = "#efdfe2" },
    { name = "*/", fg = "#ffb0ca" },
]

# : ]]]
