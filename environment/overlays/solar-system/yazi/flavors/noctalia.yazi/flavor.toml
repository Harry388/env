# : Manager [[[

[mgr]
cwd = { fg = "#f0dfd7" }

# Tab
tab_active = { fg = "#522300", bg = "#ffb68b", bold = true }
tab_inactive = { fg = "#6f3811", bg = "#ffdbc8" }
tab_width = 1

# Find
find_keyword = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied = { fg = "#4a491e", bg = "#4a491e" }
marker_cut = { fg = "#4a491e", bg = "#4a491e" }
marker_marked = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#ccc992", bg = "#ccc992" }

# Count
count_copied = { fg = "#e8e5ac", bg = "#4a491e" }
count_cut = { fg = "#e8e5ac", bg = "#4a491e" }
count_selected = { fg = "#522300", bg = "#ccc992" }

# Border
border_style  = { fg = "#ffb68b" }

# : ]]]


# : Status [[[

[status]
separator_style = { bg = "#522300", fg = "#F4A261" }

[mode]
# Mode
normal_main = { bg = "#ffb68b", fg = "#522300", bold = true }
normal_alt  = { bg = "#52443c", fg = "#d7c2b8" }

# Select mode
select_main = { bg = "#e5bfaa", fg = "#432b1c", bold = true }
select_alt  = { bg = "#52443c", fg = "#d7c2b8" }

# Unset mode
unset_main = { bg = "#ccc992", fg = "#333209", bold = true }
unset_alt  = { bg = "#52443c", fg = "#d7c2b8" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#ffb68b", bg = "#1a120d" }
progress_error = { fg = "#ffb4ab", bg = "#1a120d" }

# Permissions
permissions_t = { fg = "#e5bfaa" }
permissions_w = { fg = "#ccc992" }
permissions_x = { fg = "#ffb4ab" }
permissions_r = { fg = "#4a491e" }
permissions_s = { fg = "#6f3811" }

# : ]]]


# : Select [[[

[select]
border = { fg = "#ffb68b" }
active = { fg = "#ccc992", bold = true }

# : ]]]


# : Input [[[

[input]
border = { fg = "#ffb68b" }
value = { fg = "#f0dfd7" }

# : ]]]

# : Tabs [[[

[tabs]
active = { fg = "#ffb68b", bold = true, bg = "#1a120d" }
inactive = { fg = "#e5bfaa", bg = "#1a120d" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Completion [[[

[completion]
border = { fg = "#ffb68b", bg = "#522300" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#ffb68b" }
title = {}
hovered = { fg = "#4a491e", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#1a120d" }
cand = { fg = "#ffb68b" }
rest = { fg = "#522300" }
desc = { fg = "#f0dfd7" }
separator = " ▶ "
separator_style = { fg = "#f0dfd7" }

# : ]]]


# : Help [[[

[help]
on = { fg = "#f0dfd7" }
run = { fg = "#f0dfd7" }
footer = { fg = "#432b1c", bg = "#e5bfaa" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#ccc992" }
title_warn = { fg = "#ffb68b" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { name = "*", is = "orphan", bg = "#93000a" },
    { name = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { name = "*", fg = "#f0dfd7" },
    { name = "*/", fg = "#ffb68b" },
]

# : ]]]
