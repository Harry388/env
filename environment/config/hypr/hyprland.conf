source=./theme.conf
source=./monitors.conf

# exec added by nix
exec-once=dbus-update-activation-environment --systemd DISPLAY HYPRLAND_INSTANCE_SIGNATURE WAYLAND_DISPLAY XDG_CURRENT_DESKTOP && systemctl --user stop hyprland-session.target && systemctl --user start hyprland-session.target

$browser=zen
$mainMod=SUPER
$menu=vicinae toggle
$terminal=ghostty
$lock=dms ipc call lock lock
$screenshot=flameshot gui
# $screenshot=grimblast --freeze copy area
$emoji=vicinae vicinae://extensions/vicinae/vicinae/search-emojis
$windows=vicinae vicinae://extensions/vicinae/wm/switch-windows
$notifications=dms ipc call notifications toggle
$switchEnv=switch-env
$calculator=gnome-calculator
$colourPicker=hyprpicker -a

$moveStep=20
$resizeStep=10

exec-once=noctalia-shell
exec-once=wl-paste --watch cliphist store
exec=set-wallpaper $wallpaper
exec-once=udiskie
exec-once=hyprctl dispatch exec "[workspace 2 silent]" $terminal
exec-once=flameshot
exec-once=vicinae server

################################################################################
# Keybinds                                                                     #
################################################################################

# Keys

bind=$mainMod, t, exec, $terminal
bind=$mainMod, b, exec, $browser
bind=$mainMod, r, exec, $switchEnv
bind=$mainMod, w, exec, $windows
bind=$mainMod, space, exec, $menu
bind=$mainMod, q, killactive
bind=$mainMod, m, exit
bind=$mainMod, n, exec, $notifications
bind=$mainMod, f, fullscreen
bind=$mainMod, g, togglefloating
bind=$mainMod SHIFT, g, pin
bind=$mainMod, d, togglegroup
bind=$mainMod, e, exec, $lock
bind=$mainMod SHIFT, e, exec, $lock
bind=$mainMod SHIFT, e, exec, systemctl suspend
bind=$mainMod, p, exec, $screenshot
bind=$mainMod SHIFT, p, exec, $colourPicker
bind=$mainMod, period, exec, $emoji
bind=$mainMod, c, exec, $calculator

bind=$mainMod, h, movefocus, l
bind=$mainMod, j, movefocus, d
bind=$mainMod, k, movefocus, u
bind=$mainMod, l, movefocus, r

bind=$mainMod SHIFT, h, movewindoworgroup, l
bind=$mainMod SHIFT, j, movewindoworgroup, d
bind=$mainMod SHIFT, k, movewindoworgroup, u
bind=$mainMod SHIFT, l, movewindoworgroup, r

bind=$mainMod ALT, l, changegroupactive, f
bind=$mainMod ALT, h, changegroupactive, b

bind=$mainMod, 1, workspace, 1
bind=$mainMod, 2, workspace, 2
bind=$mainMod, 3, workspace, 3
bind=$mainMod, 4, workspace, 4
bind=$mainMod, 5, workspace, 5
bind=$mainMod, 6, workspace, 6
bind=$mainMod, 7, workspace, 7
bind=$mainMod, 8, workspace, 8
bind=$mainMod, 9, workspace, 9
bind=$mainMod, 0, workspace, 10

bind=$mainMod SHIFT, 1, movetoworkspace, 1
bind=$mainMod SHIFT, 2, movetoworkspace, 2
bind=$mainMod SHIFT, 3, movetoworkspace, 3
bind=$mainMod SHIFT, 4, movetoworkspace, 4
bind=$mainMod SHIFT, 5, movetoworkspace, 5
bind=$mainMod SHIFT, 6, movetoworkspace, 6
bind=$mainMod SHIFT, 7, movetoworkspace, 7
bind=$mainMod SHIFT, 8, movetoworkspace, 8
bind=$mainMod SHIFT, 9, movetoworkspace, 9
bind=$mainMod SHIFT, 0, movetoworkspace, 10

bind=$mainMod, s, togglespecialworkspace, ⭐
bind=$mainMod SHIFT, s, movetoworkspace, special:⭐

binde=$mainMod, right, resizeactive, $resizeStep 0
binde=$mainMod, left, resizeactive, -$resizeStep 0
binde=$mainMod, up, resizeactive, 0 -$resizeStep
binde=$mainMod, down, resizeactive, 0 $resizeStep

binde=$mainMod SHIFT, right, moveactive, $moveStep 0
binde=$mainMod SHIFT, left, moveactive, -$moveStep 0
binde=$mainMod SHIFT, up, moveactive, 0 -$moveStep
binde=$mainMod SHIFT, down, moveactive, 0 $moveStep

binde=$mainMod, equal, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
binde=$mainMod, minus, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')
bind=$mainMod SHIFT, minus, exec, hyprctl -q keyword cursor:zoom_factor 1

# Top Row Keys

bindl = , XF86MonBrightnessUp, exec, dms ipc call brightness increment 5 ""
bindl = , XF86MonBrightnessDown, exec, dms ipc call brightness decrement 5 ""
bind=,Print, exec, $screenshot
bindl=, XF86AudioRaiseVolume, exec, dms ipc call audio increment 3
bindl=, XF86AudioLowerVolume, exec, dms ipc call audio decrement 3
bindl=, XF86AudioMute, exec, dms ipc call audio mute
bindl=, XF86AudioMicMute, exec, dms ipc call audio micmute
bindl=, XF86AudioPlay, exec, playerctl play-pause
bindl=, XF86AudioPrev, exec, playerctl previous
bindl=, XF86AudioNext, exec, playerctl next

# Mouse

bindm=$mainMod, mouse:272, movewindow
bindm=$mainMod SHIFT, mouse:272, resizewindow
bindm=$mainMod, mouse:273, resizewindow

################################################################################
# Decoration                                                                   #
################################################################################

# General

decoration {
    shadow {
        enabled=false
    }
    rounding=$rounding
}

general {
    border_size=$borderSize
    col.inactive_border=$inactive
    col.active_border=$active
    gaps_in={{gaps / 2}}
    gaps_out=$gaps
}

group {
    col.border_inactive=$inactive
    col.border_active=$active
    groupbar {
        text_color=$active
        text_color_inactive=$inactive
        col.inactive=$inactive
        col.active=$active
        font_family=monospace
        font_weight_inactive=bold
        font_weight_active=bold
        indicator_height=$indicatorHeight
        gaps_in=0
        gaps_out=$gaps
        keep_upper_gap=false
        font_size=10
        rounding=$indicatorRounding
    }
}

windowrulev2=rounding $floatingRounding, floating:1

# Animation

animation=workspaces, 0
animation=windows, 1, 4, default

windowrulev2=noanim, class:(flameshot)

# Blur

decoration {
    blur {
        enabled=true
        passes=4
        size=6
    }
}

layerrule=blur, waybar
layerrule=blur, vicinae
layerrule=blur, swaync-control-center
layerrule=blur, quickshell:bar
layerrule=xray 1, quickshell:bar # fixes blur flicker
layerrule=ignorezero, vicinae
layerrule=ignorezero, quickshell:bar

# Floating

windowrulev2=float, title:(Calculator)
windowrulev2=float, class:(org.pulseaudio.pavucontrol)
windowrulev2=float, class:(.blueman-manager-wrapped)
windowrulev2=float, title:(Firefox - Choose User Profile)

# Flameshot Specific

windowrulev2=move 0 0,title:^(flameshot)$
windowrulev2=float,title:^(flameshot)$
windowrulev2=pin,title:^(flameshot)$

################################################################################
# Other                                                                        #
################################################################################

input {
    touchpad {
        natural_scroll=true
    }
    kb_layout=gb
}

cursor {
    no_hardware_cursors=true
}

misc {
    disable_splash_rendering=true
    disable_hyprland_logo=true
    disable_autoreload=true
}
