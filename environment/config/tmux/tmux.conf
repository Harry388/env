set  -g default-terminal "tmux-256color"
set  -g base-index      1
setw -g pane-base-index 1

set -g status-keys vi
set -g mode-keys   vi

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

set  -g mouse             on
set  -g focus-events      off
setw -g aggressive-resize off
set  -s escape-time       0
set  -g history-limit     2000

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel
bind -n M-1 run-shell 'tmux-pin-pane sync ":1.{left}"; tmux select-window -t 1'
bind -n M-2 run-shell 'tmux-pin-pane sync ":2.{left}"; tmux select-window -t 2'
bind -n M-3 run-shell 'tmux-pin-pane sync ":3.{left}"; tmux select-window -t 3'
bind -n M-4 run-shell 'tmux-pin-pane sync ":4.{left}"; tmux select-window -t 4'
bind -n M-5 run-shell 'tmux-pin-pane sync ":5.{left}"; tmux select-window -t 5'
bind -n M-6 run-shell 'tmux-pin-pane sync ":6.{left}"; tmux select-window -t 6'
bind -n M-7 run-shell 'tmux-pin-pane sync ":7.{left}"; tmux select-window -t 7'
bind -n M-8 run-shell 'tmux-pin-pane sync ":8.{left}"; tmux select-window -t 8'
bind -n M-9 run-shell 'tmux-pin-pane sync ":9.{left}"; tmux select-window -t 9'
bind -n M-0 run-shell 'tmux-pin-pane sync ":0.{left}"; tmux select-window -t 0'
bind v split-window -h -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind-key C-a last-window
bind-key n run-shell "tmux-try-app nvim 1"
bind-key i run-shell "tmux-try-app 'opencode .' 99"
bind-key -n C-s display-popup -b rounded -w "85%" -h "85%" -e "DISABLE_NIX_SHELL_ON_CD=1" -E "session"

bind-key p run-shell -b "tmux-pin-pane toggle"
set-hook -g session-window-changed 'run-shell -b "tmux-pin-pane sync"'
set-hook -g after-resize-pane 'run-shell -b "tmux-pin-pane resize"'

set -g status-style bg=default
set -g status-left ""
set -g status-right "#[align=absolute-centre] [#{session_name}] #[align=right]"
set -ga status-right "#{?window_bigger,[#{window_offset_x}#,#{window_offset_y}] ,}\ %d.%m.%y %H:%M #{client_user}@#H "
set -g status-right-length 65
